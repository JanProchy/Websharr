services:
    websharr:
        build: .
        container_name: websharr
        restart: unless-stopped
        # Run as your host user so downloaded files are yours (movable/deletable),
        # same idea as PUID/PGID in the *arr containers.
        user: "${PUID:-1000}:${PGID:-1000}"
        ports:
            - "9797:9797"
        environment:
            # All optional — the first-run wizard at http://localhost:9797/ui
            # handles the Webshare credentials and generates an API key.
            WEBSHARE_USERNAME: ${WEBSHARE_USERNAME:-}
            WEBSHARE_PASSWORD: ${WEBSHARE_PASSWORD:-}
            WEBSHARR_API_KEY: ${WEBSHARR_API_KEY:-}
            MAX_CONCURRENT_DOWNLOADS: "2"
        volumes:
            # Must be the SAME host path that Sonarr/Radarr see as their download dir,
            # otherwise use Remote Path Mappings in *arr.
            - /home/morte/Downloads/__test_downloads/websharr:/downloads
            - ./config:/config
