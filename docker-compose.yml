services:
  websharr:
    build: .
    container_name: websharr
    restart: unless-stopped
    ports:
      - "9797:9797"
    environment:
      WEBSHARE_USERNAME: ${WEBSHARE_USERNAME:?set in .env}
      WEBSHARE_PASSWORD: ${WEBSHARE_PASSWORD:?set in .env}
      WEBSHARR_API_KEY: ${WEBSHARR_API_KEY:-change-me}
      MAX_CONCURRENT_DOWNLOADS: "2"
    volumes:
      # Must be the SAME host path that Sonarr/Radarr see as their download dir,
      # otherwise use Remote Path Mappings in *arr.
      - /data/downloads/websharr:/downloads
      - ./config:/config
